# Default configuration file for the histogram plot
# Users can create another configuration file to overwrite
# specific values defined in this configuration file,
# or define their own key-value pairs that cover those defined
# in this file.

[config]
height = 400
width = 600
# Deliberately omit this to test for missing key-value
#title = Histogram
bargap = 0.2
show_legend = true
legend_titles =
#['', 'percent', 'probability', 'density', 'probability','density']
plot_bgcolor = rgba(0,0,0,0)
histnorm =
image_name = histogram
scale = 2
opacity = White
border_width = 2
# horizontal position anchor: (“auto” | “left” | “center” | “right” )
x_anchor = center
# vertical position anchor: (“auto” | “left” | “center” | “right” )
y_anchor = top
marker_color = Black

[legend]
x = 0.5
y = -0.3
orientation = h
font_family = sans serif
font_size =  black
font_color =  12
bgcolor = White
border_color = Black
border_width = 2
xanchor = center
yanchor = top



[xaxis]
x = 0.5
y = -0.2
# x-axis line color
linecolor = black
#whether or not a line bounding x-axis is drawn
showline = true
#width (in px) of x-axis line
linewidth = 2

[xaxis_title]
text = x Axis
font_family = Courier New, monospace
font_size = 14
font_color = Black

[yaxis]
x = -0.1
y = 0.5
#y-axis line color
linecolor = black
# width (in px) of y-axis line
linewidth = 2
# whether or not a line bounding y-axis is drawn
showline = True
# whether or not grid lines are drawn
showgrid = True
# whether ticks are drawn or not. one of ( "outside" | "inside" | "" )
ticks = inside
ticks_tickwidth = 1
# Sets the tick color.
tickcolor = black
# the width (in px) of the grid lines
gridwidth = 1
# the color of the grid lines
gridcolor = rgb(244, 244, 248)
#Sets the range of the range slider
range=
#range = [0, 6000]

[yaxis_title]
text = y Axis
font_family = Courier New, monospace
font_size = 14
font_color = Black

[xbins]
#start = 0
#end = 200
size = 10

[dir]
LOG_DIR = /tmp
OUTPUT_BASE = /tmp
METPLUS_CONF = {OUTPUT_BASE}/metplus_final.conf


[filename_templates]

[regex_pattern]

[exe]

