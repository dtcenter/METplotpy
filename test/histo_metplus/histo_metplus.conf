# Default configuration file for the histogram plot
# Users can create another configuration file to overwrite
# specific values defined in this configuration file,
# or define their own key-value pairs that cover those defined
# in this file.

[config]
height = 400
width = 600
# location and name of the final configuration file (the resulting config file
# after overriding the default config files with the user's custom settings).
METPLOTPY_CONF = {OUTPUT_BASE}/metplotpy_final.conf
METPLUS_CONF = {METPLOTPY_CONF}

[xaxis_title]
font_color = Red

# supported plot types are: histogram
plot_type = histogram

[dir]
# These key-values aren't used when METplotpy is run stand-alone, but set these to a valid
# directory so we don't generate warnings or errors when these aren't explicitly set.
#
# If METplotpy is not run stand-alone, then set these to valid and relevant paths.
OUTPUT_BASE = /tmp
MET_INSTALL_DIR = {OUTPUT_BASE}
MET_BASE ={OUTPUT_BASE}
TMP_DIR = {OUTPUT_BASE}
PROJ_DIR = {OUTPUT_BASE}
INPUT_BASE = {PROJ_DIR}
MODEL_DATA_DIR = {PROJ_DIR}
LOG_DIR = /tmp


