# Default configuration file for the histogram plot
# Users can create another configuration file to overwrite
# specific values defined in this configuration file,
# or define their own key-value pairs that cover those defined
# in this file.

[config]
height = 400
width = 600
title = Histogram
bargap = 0.2
show_legend = true
legend_orientation = h
#['', 'percent', 'probability', 'density', 'probability','density']
plot_bgcolor = rgba(0,0,0,0)
histnorm =

imagename = histogram
scale = 2

opacity = White
orientation = Black
border_width = 2
# horizontal position anchor: (“auto” | “left” | “center” | “right” )
x_anchor = center
# vertical position anchor: (“auto” | “left” | “center” | “right” )
y_anchor = top




legend_x = 0.5
legend_y = -0.3
font_family = sans serif
font_size =  black
font_color =  12
bgcolor =
border_color =


xaxis_x = 0.5
xaxis_y = -0.2
xaxis_title = x Axis
xaxis_title_text_font_family = Courier New, monospace
xaxis_title_text_font_size = 14
xaxis_title_text_font_color = Black
# x-axis line color
xaxis_linecolor = black
#whether or not a line bounding x-axis is drawn
xaxis_showline = true
#width (in px) of x-axis line
xaxis_linewidth = 2

yaxis_x = -01
yaxis_y = 0.5
yaxis_title_text = y Axis
yaxis_title_font_family = Courier New, monospace
yaxis_title_font_size = 14
yaxis_title_font_color = Black
# y-axis line color
yaxis_linecolor = black
# width (in px) of y-axis line
yaxis_linewidth = 2
# whether or not a line bounding y-axis is drawn
yaxis_showline =
# whether or not grid lines are drawn
yaxis_showgrid =

# whether ticks are drawn or not. one of ( "outside" | "inside" | "" )
yaxis_ticks = inside
yaxis_ticks_tickwidth = 1
# Sets the tick color.
yaxis_tickcolor = black
# the width (in px) of the grid lines
yaxis_gridwidth = 1
# the color of the grid lines
yaxis_gridcolor = rgb(244, 244, 248)
#Sets the range of the range slider
# yaxis_range = [0, 6000]



[dir]
# These key-values aren't used when METplotpy is run stand-alone, but set these to a valid
# directory so we don't generate warnings or errors when these aren't explicitly set.
#
# If METplotpy is not run stand-alone, then set these to valid and relevant paths.
OUTPUT_BASE = /tmp
MET_INSTALL_DIR = {OUTPUT_BASE}
MET_BASE ={OUTPUT_BASE}
TMP_DIR = {OUTPUT_BASE}
PROJ_DIR = {OUTPUT_BASE}
INPUT_BASE = {PROJ_DIR}
MODEL_DATA_DIR = {PROJ_DIR}

